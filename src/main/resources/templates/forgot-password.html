<!doctype html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base::layout(~{::section})}">

<head>
    <meta charset="UTF-8" />
    <title>Forgot Password</title>
</head>

<body>

<section class="auth-section">

    <div class="auth-card">

        <div class="auth-header">
            <span class="auth-stamp">◈</span>
            <h1 th:if="${param.verified == null}">Forgot Password</h1>
            <h1 th:if="${param.verified != null}">Set New Password</h1>
            <p class="auth-sub" th:if="${param.verified == null}">Enter your registered email and phone to verify your identity.</p>
            <p class="auth-sub" th:if="${param.verified != null}">Identity verified. Choose a new password.</p>
        </div>

        <div th:if="${session.fpFail}" class="form-msg form-msg-error">
            <p th:text="${session.fpFail}"></p>
            <th:block th:text="${#session.removeAttribute('fpFail')}"></th:block>
        </div>

        <!-- STEP 1: Verify Email + Phone -->
        <form th:if="${param.verified == null}" th:action="@{/verify-user}" method="post" class="auth-form">

            <div class="input-group">
                <label for="email">Email Id</label>
                <div class="input-wrap">
                    <svg class="input-icon" viewBox="0 0 24 24"><path d="M20 4H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V6a2 2 0 00-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                    <input type="email" id="email" name="email" placeholder="Enter your registered email" required>
                </div>
            </div>

            <div class="input-group">
                <label for="phone">Phone Number</label>
                <div class="input-wrap">
                    <svg class="input-icon" viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.7 3.6 5 6.4 6.4l2.1-2.1c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.5.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.4 21 3 13.6 3 4.5c0-.6.4-1 1-1H7.5c.6 0 1 .4 1 1 0 1.2.2 2.4.6 3.5.1.4 0 .8-.2 1L6.6 10.8z"/></svg>
                    <input type="tel" id="phone" name="phone" placeholder="Enter your registered phone number"
                           pattern="[0-9]{10}" maxlength="10" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Verify Identity</button>

            <p class="auth-switch">Remembered your password? <a th:href="@{/signin}">Login here</a></p>

        </form>

        <!-- STEP 2: Set New Password -->
        <form th:if="${param.verified != null}" th:action="@{/reset-password}" method="post" class="auth-form">

            <div class="input-group">
                <label for="newPassword">New Password</label>
                <div class="input-wrap">
                    <svg class="input-icon" viewBox="0 0 24 24"><path d="M17 8V7a5 5 0 00-10 0v1H5v13h14V8h-2zm-8-1a3 3 0 016 0v1H9V7zm3 6a2 2 0 012 2c0 .9-.6 1.6-1.4 1.9V19h-1.2v-2.1c-.8-.3-1.4-1-1.4-1.9a2 2 0 012-2z"/></svg>
                    <input type="password" id="newPassword" name="newPassword" placeholder="Enter new password" required minlength="6">
                </div>
            </div>

            <div class="input-group">
                <label for="confirmPassword">Confirm Password</label>
                <div class="input-wrap">
                    <svg class="input-icon" viewBox="0 0 24 24"><path d="M17 8V7a5 5 0 00-10 0v1H5v13h14V8h-2zm-8-1a3 3 0 016 0v1H9V7zm3 6a2 2 0 012 2c0 .9-.6 1.6-1.4 1.9V19h-1.2v-2.1c-.8-.3-1.4-1-1.4-1.9a2 2 0 012-2z"/></svg>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter new password" required minlength="6">
                </div>
                <span class="field-hint" id="matchHint"></span>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Reset Password</button>

        </form>

    </div>

</section>

<script th:if="${param.verified != null}">
    const newPw = document.getElementById('newPassword');
    const confirmPw = document.getElementById('confirmPassword');
    const hint = document.getElementById('matchHint');

    function checkMatch() {
        if (confirmPw.value === '') { hint.textContent = ''; return; }
        if (newPw.value === confirmPw.value) {
            hint.textContent = 'Passwords match';
            hint.style.color = '#157A4A';
        } else {
            hint.textContent = 'Passwords do not match';
            hint.style.color = '#c0392b';
        }
    }
    newPw.addEventListener('input', checkMatch);
    confirmPw.addEventListener('input', checkMatch);
</script>

</body>
</html>
