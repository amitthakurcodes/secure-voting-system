<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})}">
<head>
	<meta charset="UTF-8" />
	<title>Login</title>
</head>
<body>
	<section class="auth-section">

	<div class="auth-card">

		<div class="auth-header">
			<span class="auth-stamp">◈</span>
			<h1>Welcome Back</h1>
			<p class="auth-sub">Login to cast your vote securely.</p>
		</div>

		<div th:if="${session.vmsg}" class="form-msg form-msg-success">
			<p th:text="${session.vmsg}"></p>
			<th:block th:text="${#session.removeAttribute('vmsg')}"></th:block>
		</div>

		<div th:if="${param.error}" class="form-msg form-msg-error">
			<p>Invalid username or password</p>
		</div>

		<div th:if="${param.logout}" class="form-msg form-msg-success">
			<p>You have been successfully logged out.</p>
		</div>

		<form th:action="@{/dologin}" method="post" class="auth-form">

			<div class="input-group">
				<label for="username">Email Id</label>
				<div class="input-wrap">
					<svg class="input-icon" viewBox="0 0 24 24"><path d="M20 4H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V6a2 2 0 00-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
					<input type="text" id="username" name="username" placeholder="Enter your email id" required>
				</div>
			</div>

			<div class="input-group">
				<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
					<label for="password" style="margin-bottom:0;">Password</label>
					<a th:href="@{/forgot-password}" style="font-size:0.82rem; color:var(--indelible-violet); text-decoration:none; font-weight:500;">Forgot Password?</a>
				</div>
				<div class="input-wrap">
					<svg class="input-icon" viewBox="0 0 24 24"><path d="M17 8V7a5 5 0 00-10 0v1H5v13h14V8h-2zm-8-1a3 3 0 016 0v1H9V7zm3 6a2 2 0 012 2c0 .9-.6 1.6-1.4 1.9V19h-1.2v-2.1c-.8-.3-1.4-1-1.4-1.9a2 2 0 012-2z"/></svg>
					<input type="password" id="password" name="password" placeholder="Enter your password" required>
					<button type="button" class="toggle-pass" id="togglePassBtn" aria-label="Toggle password visibility">👁</button>
				</div>
			</div>

			<button type="submit" class="btn btn-primary btn-block">Login</button>

			<p class="auth-switch">New here? <a th:href="@{/register}">Register now</a></p>

		</form>

		<div class="admin-hint">
			<div class="admin-hint-icon">🛡</div>
			<div>
				<p class="admin-hint-title">Signing in as Admin?</p>
				<p class="admin-hint-text">Email: <strong>admin</strong> &nbsp;•&nbsp; Password: <strong>admin</strong></p>
			</div>
		</div>

	</div>

	<!-- SCRIPT ab section ke ANDAR hai -->
	<script>
		document.getElementById('togglePassBtn').addEventListener('click', function () {
			const pw = document.getElementById('password');
			const isHidden = pw.type === 'password';
			pw.type = isHidden ? 'text' : 'password';
			this.textContent = isHidden ? '🙈' : '👁';
		});
	</script>

	</section>

</body>
</html>
