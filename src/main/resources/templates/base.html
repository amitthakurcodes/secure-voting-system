<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" th:href="@{/css/bootstrap.css}" />
  <link rel="stylesheet" th:href="@{/css/style.css}" />

  <title th:text="${title}">Title</title>
</head>
<body>

  <nav class="navbar-main">
    <div class="nav-inner">
      <a th:href="@{/}" class="brand">
        <span class="brand-stamp">◈</span>
        <span class="brand-text">VoteSecure</span>
      </a>
      <ul class="nav-links">
        <li><a class="active" th:href="@{/}">Home</a></li>
        <li><a th:href="@{/register}">Register</a></li>
        <li><a th:href="@{/signin}">Login</a></li>
        <li><a th:href="@{/about}">About</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <div th:replace="${content}"></div>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 VoteSecure — Built for transparent, secure elections.</p>
  </footer>

</body>
</html>
