<!doctype html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base::layout(~{::section})}">

<head>
    <meta charset="UTF-8" />
    <title>Register</title>
</head>

<body>

<section class="auth-section">

    <div class="auth-card">

        <div class="auth-header">
            <span class="auth-stamp">◈</span>
            <h1>Create Your Account</h1>
            <p class="auth-sub">Register once, vote securely.</p>
        </div>

        <div th:if="${session.fail}" class="form-msg form-msg-error">
            <p th:text="${session.fail}"></p>
            <th:block th:text="${#session.removeAttribute('fail')}"></th:block>
        </div>

        <!-- Hidden flag: agar success message hai toh popup + redirect trigger hoga -->
        <div id="successFlag"
             th:if="${session.msg}"
             th:text="${session.msg}"
             th:attr="data-url=@{/signin}"
             style="display:none;"></div>
        <th:block th:if="${session.msg}" th:text="${#session.removeAttribute('msg')}"></th:block>

        <form th:action="@{/createuser}" method="post" class="auth-form" id="registerForm" novalidate>

            <div class="input-group">
                <label for="name">User Name</label>
                <div class="input-wrap">
                    <svg class="input-icon" viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.9-2.2 4.9-4.9S14.7 2.2 12 2.2 7.1 4.4 7.1 7.1 9.3 12 12 12zm0 2.4c-3.3 0-9.8 1.6-9.8 4.9v2.4h19.6v-2.4c0-3.3-6.5-4.9-9.8-4.9z"/></svg>
                    <input type="text" id="name" name="name" placeholder="Enter your user name" required minlength="3">
                </div>
                <span class="field-hint"></span>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <div class="input-wrap">
                    <svg class="input-icon" viewBox="0 0 24 24"><path d="M17 8V7a5 5 0 00-10 0v1H5v13h14V8h-2zm-8-1a3 3 0 016 0v1H9V7zm3 6a2 2 0 012 2c0 .9-.6 1.6-1.4 1.9V19h-1.2v-2.1c-.8-.3-1.4-1-1.4-1.9a2 2 0 012-2z"/></svg>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required minlength="6">
                    <button type="button" class="toggle-pass" id="togglePassBtn" aria-label="Toggle password visibility">👁</button>
                </div>
                <div class="strength-bar"><span id="strengthFill"></span></div>
                <span class="field-hint" id="strengthText">Minimum 6 characters</span>
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <div class="input-wrap">
                    <svg class="input-icon" viewBox="0 0 24 24"><path d="M20 4H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V6a2 2 0 00-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                <span class="field-hint"></span>
            </div>

            <div class="input-group">
                <label for="phone">Phone</label>
                <div class="input-wrap">
                    <svg class="input-icon" viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.7 3.6 5 6.4 6.4l2.1-2.1c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.5.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.4 21 3 13.6 3 4.5c0-.6.4-1 1-1H7.5c.6 0 1 .4 1 1 0 1.2.2 2.4.6 3.5.1.4 0 .8-.2 1L6.6 10.8z"/></svg>
                    <input type="tel" id="phone" name="phone" placeholder="Enter 10 digit mobile number"
                           pattern="[0-9]{10}" maxlength="10" required>
                </div>
                <span class="field-hint"></span>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Register</button>

            <p class="auth-switch">Already registered? <a th:href="@{/signin}">Login here</a></p>

        </form>

    </div>

    <!-- SUCCESS POPUP MODAL -->
    <div class="modal-overlay" id="successModal">
        <div class="modal-box">
            <svg class="modal-check" viewBox="0 0 52 52">
                <circle cx="26" cy="26" r="24" fill="none"/>
                <path d="M14 27l7 7 17-17" fill="none"/>
            </svg>
            <h3>Registered Successfully!</h3>
            <p id="modalMsgText">Redirecting you to login...</p>
        </div>
    </div>

    <script>
      const form = document.getElementById('registerForm');

      form.querySelectorAll('input[required], input[pattern]').forEach(input => {
        input.addEventListener('input', () => validateField(input));
        input.addEventListener('blur', () => validateField(input));
      });

      function validateField(input) {
        const hint = input.closest('.input-group').querySelector('.field-hint');
        const wrap = input.closest('.input-wrap');
        if (input.value.trim() === '') {
          wrap.classList.remove('valid', 'invalid');
          if (hint && hint.id !== 'strengthText') hint.textContent = '';
          return;
        }
        if (input.checkValidity()) {
          wrap.classList.add('valid');
          wrap.classList.remove('invalid');
          if (hint && hint.id !== 'strengthText') hint.textContent = '';
        } else {
          wrap.classList.add('invalid');
          wrap.classList.remove('valid');
          if (hint && hint.id !== 'strengthText') {
            if (input.type === 'email') hint.textContent = 'Enter a valid email address';
            else if (input.name === 'phone') hint.textContent = 'Must be exactly 10 digits';
            else if (input.name === 'name') hint.textContent = 'Minimum 3 characters';
            else hint.textContent = 'Please check this field';
          }
        }
      }

      // Password strength meter
      const passwordInput = document.getElementById('password');
      const strengthFill = document.getElementById('strengthFill');
      const strengthText = document.getElementById('strengthText');

      passwordInput.addEventListener('input', () => {
        const val = passwordInput.value;
        let score = 0;
        if (val.length >= 6) score++;
        if (val.length >= 10) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        const levels = [
          { width: '0%',   color: '', label: 'Minimum 6 characters' },
          { width: '20%',  color: '#c0392b', label: 'Weak' },
          { width: '40%',  color: '#c0392b', label: 'Weak' },
          { width: '60%',  color: '#E8871E', label: 'Okay' },
          { width: '80%',  color: '#157A4A', label: 'Good' },
          { width: '100%', color: '#157A4A', label: 'Strong' },
        ];
        const lvl = levels[Math.min(score, 5)];
        strengthFill.style.width = lvl.width;
        strengthFill.style.background = lvl.color;
        strengthText.textContent = val.length > 0 ? lvl.label : 'Minimum 6 characters';
      });

      // Show/hide password
      document.getElementById('togglePassBtn').addEventListener('click', function () {
        const isHidden = passwordInput.type === 'password';
        passwordInput.type = isHidden ? 'text' : 'password';
        this.textContent = isHidden ? '🙈' : '👁';
      });

      // Success popup + redirect
      const successFlag = document.getElementById('successFlag');
      if (successFlag) {
        const modal = document.getElementById('successModal');
        const modalMsgText = document.getElementById('modalMsgText');
        const redirectUrl = successFlag.getAttribute('data-url');
        modalMsgText.textContent = successFlag.textContent || 'Redirecting you to login...';
        modal.classList.add('show');
        setTimeout(() => {
          window.location.href = redirectUrl;
        }, 1800);
      }
    </script>

</section>

</body>
</html>
